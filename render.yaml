services:
  - type: web
    name: job-alert-bot
    runtime: node
    buildCommand: npm install && npx playwright install chromium
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false        # Enter this manually in the Render dashboard
      - key: NODE_ENV
        value: production
